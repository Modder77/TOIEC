<style>
:root {
  --bg: #f4ede0;
  --bg-card: #faf6ec;
  --bg-elev: #ffffff;
  --ink: #1c1814;
  --ink-soft: #5c5247;
  --ink-mute: #9a8f80;
  --line: #d9cdb8;
  --line-soft: #e8dfcc;
  --accent: #7a2e2e;
  --accent-soft: #b8514a;
  --accent-bg: #f0e1de;
  --gold: #a47e2a;
  --green: #4d6b3e;
  --green-bg: #e2ead9;
  --red: #a8362f;
  --red-bg: #f1dcd9;
  --sat: env(safe-area-inset-top);
  --sab: env(safe-area-inset-bottom);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
body {
  background-image:
    radial-gradient(circle at 20% 10%, rgba(122,46,46,0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(164,126,42,0.05) 0%, transparent 50%);
  min-height: 100vh;
  padding-top: var(--sat);
  padding-bottom: var(--sab);
}
.display { font-family: 'Fraunces', 'Source Serif Pro', Georgia, serif; letter-spacing: -0.01em; }
.mono { font-family: 'JetBrains Mono', monospace; }

.container { max-width: 1180px; margin: 0 auto; padding: 24px 18px 80px; }

/* HEADER */
.hdr { display: flex; align-items: flex-end; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid var(--line); margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
.hdr-sub { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); font-weight: 500; }
.hdr-logo { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 500; letter-spacing: -0.03em; line-height: 1; }
.hdr-logo em { font-style: italic; color: var(--accent); font-weight: 400; }
.hdr-tag { font-size: 12px; color: var(--ink-soft); margin-top: 6px; font-style: italic; }
.hdr-meta { font-size: 11px; color: var(--ink-soft); text-align: right; }
.hdr-meta .num { font-family: 'Fraunces', serif; font-size: 22px; color: var(--ink); display: block; font-weight: 500; }
.hdr-meta .lab { text-transform: uppercase; letter-spacing: 0.15em; }

/* NAV - scrollable horizontally on mobile */
.nav {
  display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--line);
  overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }
.nav button {
  background: transparent; border: 0; padding: 12px 14px; font-family: inherit; font-size: 12px;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); cursor: pointer;
  border-bottom: 2px solid transparent; font-weight: 500; flex-shrink: 0; white-space: nowrap;
}
.nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

/* CARDS */
.card { background: var(--bg-card); border: 1px solid var(--line-soft); border-radius: 4px; padding: 22px; }
.card-row { display: grid; gap: 16px; }
@media (min-width: 720px) {
  .card-row.cols-2 { grid-template-columns: 1fr 1fr; }
  .card-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .container { padding: 32px 28px 80px; }
  .nav button { padding: 12px 18px; font-size: 13px; }
  .hdr-logo { font-size: 38px; }
}

h2.section-title { font-family: 'Fraunces', serif; font-weight: 400; font-size: 28px; margin: 0 0 6px; letter-spacing: -0.015em; line-height: 1.1; }
@media (min-width: 720px) { h2.section-title { font-size: 32px; } }
h2.section-title em { font-style: italic; color: var(--accent); }
.section-kicker { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 18px; font-weight: 600; }
h3 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 19px; margin: 0 0 12px; letter-spacing: -0.01em; }

/* BUTTONS */
.btn {
  background: var(--ink); color: var(--bg-card); border: 0; padding: 12px 22px; font-family: inherit;
  font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border-radius: 2px;
  font-weight: 600; transition: all 0.18s; touch-action: manipulation;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-outline { background: transparent; color: var(--ink); border: 1px solid var(--ink); }
.btn-accent { background: var(--accent); color: #fff; }
.btn-ghost { background: transparent; color: var(--ink-soft); padding: 8px 12px; }

/* PROGRESS */
.progress-bar { height: 6px; background: var(--line-soft); border-radius: 100px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-soft)); transition: width 0.6s ease; border-radius: 100px; }

/* MODULE TILES */
.module-grid { display: grid; gap: 14px; grid-template-columns: 1fr; margin-top: 20px; }
@media (min-width: 540px) { .module-grid { grid-template-columns: 1fr 1fr; } }
@media (min-width: 900px) { .module-grid { grid-template-columns: 1fr 1fr 1fr; } }
.module-tile {
  background: var(--bg-card); border: 1px solid var(--line-soft); border-radius: 4px; padding: 22px;
  cursor: pointer; transition: all 0.18s; display: flex; flex-direction: column; gap: 10px;
  min-height: 150px; text-align: left; font-family: inherit; color: inherit; width: 100%;
}
.module-tile:active { transform: scale(0.98); border-color: var(--accent); }
.module-tile .num { font-family: 'Fraunces', serif; font-style: italic; color: var(--accent); font-size: 14px; }
.module-tile h4 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 21px; margin: 0; letter-spacing: -0.01em; }
.module-tile p { font-size: 13px; color: var(--ink-soft); margin: 0; flex: 1; }
.module-tile .meta { font-size: 11px; color: var(--ink-mute); letter-spacing: 0.1em; text-transform: uppercase; }

/* STAT CARD */
.stat { background: var(--bg-card); border: 1px solid var(--line-soft); padding: 22px; border-radius: 4px; }
.stat .label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); font-weight: 600; }
.stat .value { font-family: 'Fraunces', serif; font-size: 38px; font-weight: 400; margin: 6px 0 4px; line-height: 1; }
.stat .value em { font-style: italic; color: var(--accent); font-weight: 400; }
.stat .sub { font-size: 12px; color: var(--ink-soft); }

/* FLASHCARD */
.flash-stage { perspective: 1200px; min-height: 240px; }
.flash-card {
  position: relative; width: 100%; min-height: 240px; transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.4,0.2,0.2,1); cursor: pointer;
}
.flash-card.flipped { transform: rotateY(180deg); }
.flash-face {
  position: absolute; inset: 0; -webkit-backface-visibility: hidden; backface-visibility: hidden; padding: 28px;
  background: var(--bg-elev); border: 1px solid var(--line); border-radius: 4px;
  display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 12px;
}
.flash-face.back { transform: rotateY(180deg); background: var(--accent); color: #fff; border-color: var(--accent); }
.flash-face .word { font-family: 'Fraunces', serif; font-size: 34px; font-weight: 400; letter-spacing: -0.02em; line-height: 1.2; }
.flash-face .word em { font-style: italic; }
.flash-face .trans { font-size: 20px; }
.flash-face .ex { font-style: italic; opacity: 0.9; max-width: 480px; font-size: 14px; }
.flash-face .hint { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.6; margin-top: 10px; }

/* OPTS */
.opts { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.opt {
  background: var(--bg-elev); border: 1px solid var(--line); border-radius: 4px; padding: 13px 16px; cursor: pointer;
  font-family: inherit; font-size: 15px; text-align: left; color: var(--ink); display: flex; gap: 12px; align-items: flex-start;
  width: 100%; touch-action: manipulation;
}
.opt:active { transform: scale(0.99); }
.opt.selected { background: var(--accent-bg); border-color: var(--accent); }
.opt .marker { font-family: 'Fraunces', serif; font-style: italic; color: var(--accent); font-weight: 500; min-width: 18px; }
.opt.correct { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.opt.correct .marker { color: var(--green); }
.opt.wrong { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.opt.wrong .marker { color: var(--red); }
.opt.disabled { pointer-events: none; opacity: 0.7; }

/* TEXTAREA */
textarea {
  width: 100%; min-height: 180px; background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: 4px; padding: 14px; font-family: 'Source Sans 3', sans-serif; font-size: 15px; color: var(--ink);
  resize: vertical; line-height: 1.6; -webkit-appearance: none;
}
textarea:focus { outline: none; border-color: var(--accent); }

/* FEEDBACK */
.feedback {
  background: var(--bg-elev); border-left: 3px solid var(--accent); padding: 16px 18px; margin-top: 14px;
  border-radius: 0 4px 4px 0; font-size: 14px; line-height: 1.65;
}
.feedback h5 { font-family: 'Fraunces', serif; font-size: 16px; margin: 0 0 8px; color: var(--accent); }
.feedback.correct { border-color: var(--green); }
.feedback.correct h5 { color: var(--green); }
.feedback.wrong { border-color: var(--red); }
.feedback.wrong h5 { color: var(--red); }

/* CHIP */
.chip {
  display: inline-block; padding: 6px 12px; border: 1px solid var(--line); border-radius: 100px; font-size: 12px;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-soft); margin-right: 6px; margin-bottom: 6px;
  background: transparent; cursor: pointer; font-family: inherit; touch-action: manipulation;
}
.chip:active { transform: scale(0.97); }
.chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.chip.accent { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

/* TRANSCRIPT */
.transcript { background: var(--bg-elev); border: 1px solid var(--line-soft); border-radius: 4px; padding: 18px;
  font-family: 'Fraunces', serif; font-size: 15px; line-height: 1.75; }
.transcript .speaker { font-weight: 600; color: var(--accent); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; font-family: 'Source Sans 3'; margin-right: 6px; }
.transcript p { margin: 0 0 10px; }

.reading-text { background: var(--bg-elev); padding: 22px 24px; border-radius: 4px; border: 1px solid var(--line-soft);
  font-family: 'Fraunces', serif; font-size: 15px; line-height: 1.7; white-space: pre-wrap; }

.ribbon { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.stage-controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 16px; }
.quiet-text { color: var(--ink-soft); font-size: 13px; font-style: italic; }

.spin {
  display: inline-block; width: 14px; height: 14px; border: 2px solid var(--line); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.mock-bar {
  position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 10;
  border-bottom: 1px solid var(--line); margin-bottom: 18px; display: flex;
  justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
}

.install-banner {
  background: var(--accent-bg); border: 1px solid var(--accent); border-radius: 4px;
  padding: 12px 16px; margin-bottom: 18px; font-size: 13px; display: flex; gap: 12px;
  align-items: center; justify-content: space-between;
}
.install-banner button { background: none; border: 0; color: var(--accent); font-size: 18px; cursor: pointer; padding: 0 4px; }

/* Settings */
.settings-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--line-soft); }
.settings-row:last-child { border-bottom: 0; }
.danger { color: var(--red); }
</style>

function speak(text, voiceType = "female", rate = 0.95) {
  return new Promise((resolve) => {
    if (!window.speechSynthesis) { resolve(); return; }
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = "en-US";
    utt.rate = rate;
    const voices = window.speechSynthesis.getVoices();
    const englishVoices = voices.filter(v => v.lang.startsWith("en"));
    if (englishVoices.length > 0) {
      if (voiceType === "female") {
        utt.voice = englishVoices.find(v => /female|samantha|victoria|karen|moira|tessa|fiona|zira|ava|allison/i.test(v.name)) || englishVoices[0];
      } else {
        utt.voice = englishVoices.find(v => /male|daniel|alex|fred|tom|david|mark|aaron/i.test(v.name)) || englishVoices[englishVoices.length - 1];
      }
    }
    utt.onend = () => resolve();
    utt.onerror = () => resolve();
    window.speechSynthesis.speak(utt);
  });
}

function loadProgress() {
  try { return JSON.parse(localStorage.getItem('toeic_progress') || '{}'); }
  catch { return {}; }

function saveProgress(p) {
  try { localStorage.setItem('toeic_progress', JSON.stringify(p)); } catch(e) { console.error(e); }
}

// Précharger les voix sur iOS
function loadVoices() {
  return new Promise(resolve => {
    let voices = speechSynthesis.getVoices();
    if (voices.length) { resolve(voices); return; }
    speechSynthesis.onvoiceschanged = () => resolve(speechSynthesis.getVoices());
    setTimeout(() => resolve(speechSynthesis.getVoices()), 1000);
  });
}

// =====================================================================
// IA — communication avec le backend /api/chat
// ---------------------------------------------------------------------
// AI_ENABLED est null tant qu'on n'a pas testé, puis true/false.
// En local (file://) ou si le backend n'existe pas, les fonctions IA
// basculent sur un mode dégradé (heuristique locale).
// =====================================================================
let AI_ENABLED = null;

async function detectAI() {
  // Pas d'API possible si on ouvre le fichier en local (protocole file:)
  if (location.protocol === 'file:') { AI_ENABLED = false; return false; }
  try {
    // Health-check GET : ne consomme aucun token
    const r = await fetch('/api/chat', { method: 'GET' });
    if (!r.ok) { AI_ENABLED = false; return false; }
    const data = await r.json().catch(() => ({}));
    if (data.ok && data.hasKey) { AI_ENABLED = true; return true; }
    if (data.ok && !data.hasKey) { AI_ENABLED = 'no-key'; return false; }
    AI_ENABLED = false; return false;
  } catch {
    AI_ENABLED = false; return false;
  }
}

// Appel principal. Renvoie le texte de la réponse, ou lève une erreur.
async function callAI(messages, system, maxTokens = 1500, model) {
  const r = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, system, max_tokens: maxTokens, model })
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || `Erreur ${r.status}`);
  return data.text || '';
}

// Variante qui demande du JSON strict et le parse (pour générer des exercices)
async function callAIJson(messages, system, maxTokens = 1500) {
  const txt = await callAI(messages, system, maxTokens);
  // On retire d'éventuels backticks markdown
  const clean = txt.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  // On isole le premier objet/tableau JSON
  const start = clean.search(/[[{]/);
  const end = Math.max(clean.lastIndexOf(']'), clean.lastIndexOf('}'));
  const slice = start >= 0 && end > start ? clean.slice(start, end + 1) : clean;
  return JSON.parse(slice);
}

// =====================================================================
// SUIVI DES ERREURS & RÉVISION (répétition espacée, façon Leitner)
// ---------------------------------------------------------------------
// Chaque mauvaise réponse est consignée dans progress.review. Le module
// « Révisions » re-sert ces items, mélangés et pondérés par le nombre
// d'échecs et la « boîte » Leitner (1 = à revoir vite … 5 = maîtrisé,
// l'item est alors retiré). C'est aussi la matière première du coach IA.
// =====================================================================
const REVIEW_DELAYS = [0, 0, 60e3, 5*60e3, 60*60e3, 24*60*60e3]; // ms avant réapparition selon la boîte (index 1..5)

function reviewKey(module, q) {
  return module + '|' + String(q).trim().toLowerCase().replace(/\s+/g, ' ').slice(0, 180);
}

// Consigne une erreur (ou la réactive si elle est déjà connue).
function logMistake(item) {
  if (!item || !item.q || !Array.isArray(item.opts) || item.opts.length < 2) return;
  updateProgress(p => {
    p.review = p.review || [];
    const id = reviewKey(item.module, item.q);
    const ex = p.review.find(r => r.id === id);
    if (ex) {
      ex.box = 1; ex.wrong = (ex.wrong || 0) + 1; ex.due = Date.now(); ex.ts = Date.now();
      ex.opts = item.opts; ex.a = item.a ?? 0; ex.expl = item.expl || ex.expl || ''; ex.topic = item.topic || ex.topic;
    } else {
      p.review.push({
        id, module: item.module, topic: item.topic || item.module,
        q: item.q, opts: item.opts, a: item.a ?? 0, expl: item.expl || '',
        box: 1, wrong: 1, seen: 0, due: Date.now(), ts: Date.now()
      });
    }
    if (p.review.length > 500) p.review = p.review.slice(-500); // garde-fou mémoire
    return p;
  });
}

// Enregistre le résultat d'une révision et reprogramme l'item.
function logReviewResult(id, ok) {
  updateProgress(p => {
    p.review = p.review || [];
    const it = p.review.find(r => r.id === id);
    if (!it) return p;
    it.seen = (it.seen || 0) + 1; it.ts = Date.now();
    if (ok) {
      it.box = Math.min(5, (it.box || 1) + 1);
      if (it.box >= 5) { p.review = p.review.filter(r => r.id !== id); return p; } // maîtrisé → retiré
    } else {
      it.box = 1; it.wrong = (it.wrong || 0) + 1;
    }
    it.due = Date.now() + (REVIEW_DELAYS[it.box] || 0);
    return p;
  });
}

function reviewAll() { return state.progress.review || []; }
function reviewDue() {
  const now = Date.now();
  return reviewAll()
    .filter(r => (r.due || 0) <= now)
    .sort((a, b) => (b.wrong - a.wrong) || (a.box - b.box) || (a.due - b.due));
}
// Récap des faiblesses (par thème/module), pondéré par le nombre d'échecs.
function weaknessSummary() {
  const by = {};
  reviewAll().forEach(r => { const k = r.topic || r.module; by[k] = (by[k] || 0) + (r.wrong || 1); });
  return Object.entries(by).sort((a, b) => b[1] - a[1]); // [[topic, poids], …] décroissant
}

const $ = (sel) => document.querySelector(sel);

function h(tag, attrs = {}, ...children) {
  const el = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') el.className = attrs[k];
    else if (k === 'style') el.style.cssText = attrs[k];
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (attrs[k] === true) el.setAttribute(k, '');
    else if (attrs[k] !== false && attrs[k] != null) el.setAttribute(k, attrs[k]);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    el.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(c) : c);
  }
  return el;
}

      h('div', { class: 'card', style: 'text-align:center;padding:36px' },
        h('div', { style: 'font-size:34px;margin-bottom:8px' }, '✓'),
        h('h3', {}, 'Rien à réviser pour l\'instant'),
        h('p', { class: 'quiet-text', style: 'margin-top:8px;max-width:520px;margin-left:auto;margin-right:auto' },
          'Fais des exercices (Vocabulaire en quiz, Grammar, Reading, Listening, Examen). Chaque erreur atterrira ici et sera retravaillée — mélangée et répétée — jusqu\'à ce que tu la maîtrises.'),
        h('button', { class: 'btn', style: 'margin-top:14px', onclick: () => { state.view = 'grammar'; render(); window.scrollTo(0, 0); } }, 'Commencer par la grammaire →')
      )
    );
  }

  // Des erreurs existent mais aucune n'est due maintenant
  if (pool.length === 0) {
    return h('div', {}, header,
      h('div', { class: 'card', style: 'text-align:center;padding:32px' },
        h('div', { style: 'font-size:30px;margin-bottom:6px' }, '🌱'),
        h('h3', {}, 'Tout est à jour !'),
        h('p', { class: 'quiet-text', style: 'margin-top:8px' }, 'Tes erreurs récentes viennent d\'être révisées. Reviens un peu plus tard, ou force une session tout de suite.'),
        h('button', { class: 'btn', style: 'margin-top:14px', onclick: () => { rv.mode = 'all'; rv.currentId = null; rv.chosen = null; render(); } }, 'Réviser quand même')
      ),
      weaknessCard()
    );
  }

  // Item courant (stable jusqu'à la réponse)
  let cur = pool.find(r => r.id === rv.currentId);
  if (!cur) { cur = pool[0]; rv.currentId = cur.id; rv.chosen = null; }

  const choose = (i) => {
    if (rv.chosen !== null) return;
    rv.chosen = i;
    logReviewResult(cur.id, i === cur.a);
    render();
  };
  const nextItem = () => { rv.chosen = null; rv.currentId = null; render(); window.scrollTo(0, 0); };

  const card = h('div', { class: 'card' },
    h('div', { style: 'display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px' },
      h('span', { class: 'chip accent' }, cur.topic || cur.module),
      h('span', { class: 'chip' }, `raté ${cur.wrong}×`),
      h('span', { class: 'chip' }, `niveau ${cur.box}/5`)
    ),
    h('div', { class: 'display', style: 'font-size:20px;line-height:1.5;margin-bottom:8px' }, cur.q),
    h('div', { class: 'opts' }, cur.opts.map((opt, i) => {
      let cls = 'opt';
      if (rv.chosen !== null) {
        if (i === cur.a) cls += ' correct';
        else if (i === rv.chosen) cls += ' wrong';
        else cls += ' disabled';
      }
      return h('button', { class: cls, onclick: () => choose(i) },
        h('span', { class: 'marker' }, String.fromCharCode(65 + i)), ' ' + opt);
    }))
  );

  if (rv.chosen !== null) {
    const ok = rv.chosen === cur.a;
    card.appendChild(h('div', { class: `feedback ${ok ? 'correct' : 'wrong'}` },
      h('h5', {}, ok ? '✓ Correct — tu montes d\'un niveau' : '✗ Encore à revoir — on le reverra bientôt'),
      h('div', {}, h('strong', {}, 'Réponse : '), `${String.fromCharCode(65 + cur.a)}. ${cur.opts[cur.a]}`),
      cur.expl ? h('div', { style: 'margin-top:6px' }, cur.expl) : null,
      h('button', { class: 'btn', style: 'margin-top:12px', onclick: nextItem }, 'Suivant →')
    ));
  }

  return h('div', {}, header, card, weaknessCard());
}

// --- VOCABULAIRE ---
function renderVocabulary() {
  const v = state.vocab;
  const words = VOCAB_THEMES[v.theme].words;
  const cur = words[v.idx];

  const setTheme = (k) => { v.theme = k; v.idx = 0; v.flipped = false; v.quizOpts = null; v.quizAns = null; render(); };
  const next = () => { v.idx = (v.idx + 1) % words.length; v.flipped = false; v.quizOpts = null; v.quizAns = null; render(); };
  const prev = () => { v.idx = (v.idx - 1 + words.length) % words.length; v.flipped = false; render(); };
  const markStudied = () => {
    updateProgress(p => { p.vocab = p.vocab || { studied: 0, correct: 0 }; p.vocab.studied++; return p; });
    next();
  };

  const view = h('div', {},
    h('div', { class: 'section-kicker' }, '— Module I'),
    h('h2', { class: 'section-title' }, h('em', {}, 'Vocabulaire'), ' par thématiques'),
    h('div', { class: 'ribbon', style: 'margin:24px 0 16px' },
      Object.entries(VOCAB_THEMES).map(([k, t]) =>
        h('button', { class: `chip ${v.theme === k ? 'active' : ''}`, onclick: () => setTheme(k) },
          `${t.icon} ${t.label}`)
      )
    ),
    h('div', { class: 'ribbon', style: 'margin-bottom:20px' },
      h('button', { class: `chip ${v.mode === 'flashcards' ? 'accent' : ''}`, onclick: () => { v.mode = 'flashcards'; render(); } }, 'Cartes mémoire'),
      h('button', { class: `chip ${v.mode === 'quiz' ? 'accent' : ''}`, onclick: () => { v.mode = 'quiz'; v.quizOpts = null; render(); } }, 'Quiz'),
      h('span', { style: 'margin-left:12px;font-size:12px;color:var(--ink-mute)' }, `Mot ${v.idx + 1} / ${words.length} · en boucle ∞`)
    )
  );

  if (v.mode === 'flashcards') {
    const card = h('div', { class: `flash-card ${v.flipped ? 'flipped' : ''}`, onclick: () => { v.flipped = !v.flipped; render(); } },
      h('div', { class: 'flash-face' },
        h('div', { class: 'word' }, v.direction === 'en-fr' ? cur.en : cur.fr),
        h('div', { class: 'hint' }, `Tape pour retourner · ${v.direction === 'en-fr' ? 'EN → FR' : 'FR → EN'}`)
      ),
      h('div', { class: 'flash-face back' },
        h('div', { class: 'word' }, h('em', {}, v.direction === 'en-fr' ? cur.fr : cur.en)),
        h('div', { class: 'ex' }, `« ${cur.ex} »`),
        h('button', { class: 'btn btn-ghost', style: 'color:rgba(255,255,255,0.85);margin-top:10px', onclick: (e) => { e.stopPropagation(); speak(cur.en); } }, '♪ Écouter')
      )
    );
    view.appendChild(h('div', { class: 'flash-stage' }, card));
    view.appendChild(h('div', { class: 'stage-controls' },
      h('button', { class: 'btn btn-outline', onclick: prev }, '← Précédent'),
      h('button', { class: 'btn', onclick: markStudied }, 'Connu, suivant →'),
      h('button', { class: 'btn btn-ghost', onclick: () => { v.direction = v.direction === 'en-fr' ? 'fr-en' : 'en-fr'; render(); } }, '↔ Inverser')
    ));
  } else {
    // QUIZ
    if (!v.quizOpts) {
      const others = words.filter((_, i) => i !== v.idx).sort(() => Math.random() - 0.5).slice(0, 3);
      v.quizOpts = [...others, cur].sort(() => Math.random() - 0.5);
      v.quizAns = null;
    }
    const answer = (w) => {
      if (v.quizAns) return;
      v.quizAns = w;
      const ok = w.en === cur.en;
      if (!ok) logMistake({ module: 'vocab', topic: VOCAB_THEMES[v.theme].label, q: cur.en, opts: v.quizOpts.map(o => o.fr), a: v.quizOpts.findIndex(o => o.en === cur.en), expl: `${cur.fr} — « ${cur.ex} »` });
      updateProgress(p => {
        p.vocab = p.vocab || { studied: 0, correct: 0 };
        p.vocab.studied++;
        if (ok) p.vocab.correct = (p.vocab.correct || 0) + 1;
        return p;
      });
      render();
    };
    const card = h('div', { class: 'card' },
      h('div', { class: 'section-kicker', style: 'margin-bottom:12px' }, 'Quelle est la traduction de…'),
      h('div', { class: 'display', style: 'font-size:32px;margin-bottom:6px' }, h('em', {}, cur.en)),
      h('button', { class: 'btn btn-ghost', onclick: () => speak(cur.en) }, '♪ Écouter'),
      h('div', { class: 'opts' }, v.quizOpts.map((w, i) => {
        let cls = 'opt';
        if (v.quizAns) {
          if (w.en === cur.en) cls += ' correct';
          else if (w.en === v.quizAns.en) cls += ' wrong';
          else cls += ' disabled';
        }
        return h('button', { class: cls, onclick: () => answer(w) },
          h('span', { class: 'marker' }, String.fromCharCode(65 + i)),
          ' ' + w.fr);
      }))
    );
    if (v.quizAns) {
      const ok = v.quizAns.en === cur.en;
      card.appendChild(h('div', { class: `feedback ${ok ? 'correct' : 'wrong'}` },
        h('h5', {}, ok ? '✓ Correct' : '✗ Incorrect'),
        h('div', {}, h('strong', {}, cur.en), ' — ', h('em', {}, cur.fr)),
        h('div', { style: 'margin-top:6px;font-style:italic;color:var(--ink-soft)' }, `« ${cur.ex} »`),
        h('button', { class: 'btn', style: 'margin-top:12px', onclick: next }, 'Suivant →')
      ));
    }
    view.appendChild(card);
  }

  return view;
}

// --- LISTENING ---
function renderListening() {
  const l = state.listening;
  const lesson = LISTENING_BANK[l.lessonIdx];

  const reset = (newIdx) => {
    if (typeof newIdx === 'number') l.lessonIdx = newIdx;
    l.hasPlayed = false; l.isPlaying = false; l.answers = {}; l.submitted = false; l.showTranscript = false;
    window.speechSynthesis?.cancel();
    render();
  };

  const play = async () => {
    l.isPlaying = true; l.hasPlayed = true; render();
    for (const s of lesson.speakers) {
      await speak(s.text, s.voice);
      await new Promise(r => setTimeout(r, 300));
    }
    l.isPlaying = false; render();
  };
  const stop = () => { window.speechSynthesis?.cancel(); l.isPlaying = false; render(); };
  const submit = () => {
    l.submitted = true;
    const correct = lesson.questions.filter((q, i) => l.answers[i] === q.a).length;
    lesson.questions.forEach((q, i) => { if (l.answers[i] !== q.a) logMistake({ module: 'listening', topic: `Listening — ${lesson.title}`, q: q.q, opts: q.opts, a: q.a, expl: '' }); });
    updateProgress(p => {
      p.listening = p.listening || { attempted: 0, correct: 0 };
      p.listening.attempted += lesson.questions.length;
      p.listening.correct += correct;
      return p;
    });
    render();
  };

  const view = h('div', {},
    h('div', { class: 'section-kicker' }, '— Module II'),
    h('h2', { class: 'section-title' }, h('em', {}, 'Listening'), ' Comprehension'),
    h('p', { class: 'quiet-text', style: 'margin-bottom:14px' }, 'Écoute attentivement puis réponds sans regarder la transcription.'),
    h('div', { class: 'ribbon', style: 'margin-bottom:20px' },
      LISTENING_BANK.map((ll, i) =>
        h('button', { class: `chip ${l.lessonIdx === i ? 'accent' : ''}`, onclick: () => reset(i) }, `${i + 1}. ${ll.title}`))
    )
  );

  const card = h('div', { class: 'card' },
    h('div', { style: 'display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px' },
      h('div', {}, h('span', { class: 'chip accent' }, lesson.type), h('h3', { style: 'display:inline-block;margin-left:6px' }, lesson.title)),
      h('div', { class: 'ribbon' },
        !l.isPlaying ? h('button', { class: 'btn', onclick: play }, `♪ ${l.hasPlayed ? 'Réécouter' : 'Lecture'}`) : h('button', { class: 'btn btn-outline', onclick: stop }, '■ Stop'),
        h('button', { class: 'btn btn-ghost', onclick: () => { l.showTranscript = !l.showTranscript; render(); } }, l.showTranscript ? 'Masquer' : 'Transcription')
      )
    )
  );

  if (l.showTranscript) {
    card.appendChild(h('div', { class: 'transcript', style: 'margin-top:14px' },
      lesson.speakers.map(s => h('p', {}, h('span', { class: 'speaker' }, s.voice === 'female' ? 'A —' : 'B —'), s.text))
    ));
  }

  if (l.hasPlayed) {
    const questionsBlock = h('div', { style: 'margin-top:24px' });
    lesson.questions.forEach((q, qi) => {
      const qDiv = h('div', { style: 'margin-bottom:22px' },
        h('div', { style: 'font-family:Fraunces;font-size:17px;margin-bottom:6px' },
          h('em', { style: 'color:var(--accent);margin-right:6px' }, `${qi+1}.`), q.q)
      );
      const opts = h('div', { class: 'opts' });
      q.opts.forEach((opt, oi) => {
        let cls = 'opt';
        if (l.submitted) {
          if (oi === q.a) cls += ' correct';
          else if (l.answers[qi] === oi) cls += ' wrong';
          else cls += ' disabled';
        } else if (l.answers[qi] === oi) cls += ' selected';
        opts.appendChild(h('button', {
          class: cls,
          onclick: () => { if (!l.submitted) { l.answers[qi] = oi; render(); } }
        }, h('span', { class: 'marker' }, String.fromCharCode(65 + oi)), ' ' + opt));
      });
      qDiv.appendChild(opts);
      questionsBlock.appendChild(qDiv);
    });
    if (!l.submitted) {
      questionsBlock.appendChild(h('button', {
        class: 'btn btn-accent',
        disabled: Object.keys(l.answers).length < lesson.questions.length,
        onclick: submit
      }, 'Valider mes réponses'));
    } else {
      const ok = lesson.questions.filter((q,i) => l.answers[i] === q.a).length;
      questionsBlock.appendChild(h('div', { class: 'feedback correct' },
        h('h5', {}, 'Résultat'),
        h('div', {}, `${ok} / ${lesson.questions.length} bonnes réponses`),
        h('div', { class: 'stage-controls' },
          h('button', { class: 'btn btn-outline', onclick: () => reset(l.lessonIdx) }, 'Recommencer'),
          h('button', { class: 'btn', onclick: () => reset((l.lessonIdx + 1) % LISTENING_BANK.length) }, 'Suivant →')
        )
      ));
    }
    card.appendChild(questionsBlock);
  } else {
    card.appendChild(h('p', { class: 'quiet-text', style: 'margin-top:16px' }, 'Lance la lecture pour faire apparaître les questions.'));
  }

  view.appendChild(card);
  return view;
}

// --- GRAMMAR ---
function renderGrammar() {
  const g = state.grammar;
  // 100 % banque locale, mélangée et bouclée à l'infini (aucun token consommé)
  const q = GRAMMAR_BANK[g.order[g.idx]];
  const poolLen = g.order.length;

  const choose = (i) => {
    if (g.chosen !== null) return;
    g.chosen = i;
    const ok = i === q.a;
    if (!ok) logMistake({ module: 'grammar', topic: 'Grammaire', q: q.q, opts: q.opts, a: q.a, expl: q.expl });
    g.total++; if (ok) g.ok++;
    updateProgress(p => {
      p.grammar = p.grammar || { attempted: 0, correct: 0 };
      p.grammar.attempted++;
      if (ok) p.grammar.correct++;
      return p;
    });
    render();
  };
  const next = () => {
    g.chosen = null;
    g.idx = g.idx + 1;
    // Boucle infinie : arrivé au bout, on re-mélange la banque
    if (g.idx >= poolLen) { g.order = shuffle([...GRAMMAR_BANK.keys()]); g.idx = 0; }
    render();
  };

  const card = h('div', { class: 'card' },
    h('div', { class: 'display', style: 'font-size:21px;line-height:1.5;margin-bottom:8px' },
      h('em', { style: 'color:var(--accent)' }, `${g.idx + 1}.`), ' ' + q.q),
    h('div', { class: 'opts' }, q.opts.map((opt, i) => {
      let cls = 'opt';
      if (g.chosen !== null) {
        if (i === q.a) cls += ' correct';
        else if (i === g.chosen) cls += ' wrong';
        else cls += ' disabled';
      }
      return h('button', { class: cls, onclick: () => choose(i) },
        h('span', { class: 'marker' }, String.fromCharCode(65 + i)), ' ' + opt);
    }))
  );
  if (g.chosen !== null) {
    card.appendChild(h('div', { class: `feedback ${g.chosen === q.a ? 'correct' : 'wrong'}` },
      h('h5', {}, g.chosen === q.a ? '✓ Correct' : '✗ Incorrect'),
      h('div', {}, h('strong', {}, 'Réponse : '), `${String.fromCharCode(65 + q.a)}. ${q.opts[q.a]}`),
      h('div', { style: 'margin-top:6px' }, q.expl || ''),
      h('button', { class: 'btn', style: 'margin-top:12px', onclick: next }, 'Question suivante →')
    ));
  }

  return h('div', {},
    h('div', { class: 'section-kicker' }, '— Module IV'),
    h('h2', { class: 'section-title' }, h('em', {}, 'Grammar'), ' · Part 5'),
    h('p', { class: 'quiet-text', style: 'margin-bottom:14px' }, `Question ${g.idx + 1} / ${poolLen} · en boucle ∞ · Session : ${g.ok}/${g.total}`),
    card
  );
}

// --- WRITING (correction IA + repli heuristique local) ---
function renderWriting() {
  const w = state.writing;
  const prompt = WRITING_PROMPTS[w.idx];
  const wordCount = w.text.trim().split(/\s+/).filter(Boolean).length;

  const reset = (newIdx) => {
    if (typeof newIdx === 'number') w.idx = newIdx;
    w.text = ''; w.feedback = null; w.aiFeedback = null; render();
  };

  // Correction par IA (qualitative, détaillée)
  const aiReview = async () => {
    w.loading = true; w.aiFeedback = null; w.feedback = null; render();
    const system = `Tu es un examinateur TOEIC Writing expert. Évalue la réponse d'un étudiant français à une tâche d'écriture. Réponds EN FRANÇAIS, mais cite l'anglais de l'étudiant en anglais. Sois constructif, précis et encourageant. Structure EXACTEMENT ainsi (en Markdown léger) :

**Note estimée : X/5**

**Points forts**
- (2-3 puces)

**Points à améliorer**
- (3-5 puces, avec exemples précis tirés du texte)

**Corrections suggérées**
- Reformule 2-3 phrases problématiques : montre la version originale puis la version corrigée.

**Version améliorée (extrait)**
- Propose une version améliorée de 2 à 4 phrases, en anglais.

Adapte le niveau d'exigence au type de tâche.`;
    const userMsg = `Type de tâche : ${prompt.type}
Titre : ${prompt.title}
Énoncé :
${prompt.prompt}

Consigne : ${prompt.instruction}

---
Réponse de l'étudiant (${wordCount} mots) :
${w.text}
---

Donne ton évaluation maintenant.`;
    try {
      w.aiFeedback = await callAI([{ role: 'user', content: userMsg }], system, 1800);
      updateProgress(p => { p.writing = p.writing || { submitted: 0 }; p.writing.submitted++; return p; });
    } catch (e) {
      w.aiFeedback = "⚠ La correction IA a échoué : " + e.message + "\n\nBascule sur l'auto-évaluation locale ci-dessous.";
      localSelfReview();
    }
    w.loading = false; render();
  };

  // Auto-évaluation heuristique locale (repli hors-ligne)
  const localSelfReview = () => {
    const text = w.text.trim();
    const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
    const words = text.split(/\s+/).filter(Boolean);
    const avgLen = words.length / Math.max(sentences.length, 1);
    const longWords = words.filter(x => x.length > 7).length;
    const lexDiv = new Set(words.map(x => x.toLowerCase())).size / Math.max(words.length, 1);
    const checks = [];
    const targetMin = prompt.type === 'opinion_essay' ? 230 : prompt.type === 'email_response' ? 90 : 12;
    const targetMax = prompt.type === 'opinion_essay' ? 320 : prompt.type === 'email_response' ? 170 : 40;
    if (words.length < targetMin) checks.push(`⚠ Texte trop court (${words.length} mots). Vise au moins ${targetMin}.`);
    else if (words.length > targetMax) checks.push(`⚠ Texte un peu long (${words.length} mots). Cible : ${targetMin}–${targetMax}.`);
    else checks.push(`✓ Longueur appropriée (${words.length} mots).`);
    if (sentences.length < 3) checks.push(`⚠ Trop peu de phrases (${sentences.length}).`);
    else checks.push(`✓ Structure en ${sentences.length} phrases.`);
    if (avgLen < 8) checks.push('⚠ Phrases très courtes en moyenne.');
    else if (avgLen > 28) checks.push('⚠ Phrases longues — risque de lourdeur.');
    else checks.push(`✓ Longueur moyenne équilibrée (${avgLen.toFixed(1)} mots).`);
    if (lexDiv < 0.45) checks.push('⚠ Variété lexicale faible.');
    else checks.push(`✓ Bonne variété lexicale (${Math.round(lexDiv*100)}%).`);
    const connectors = ['however','moreover','therefore','furthermore','in addition','on the other hand','firstly','secondly','finally','in conclusion','for instance','because','although'];
    const found = connectors.filter(c => text.toLowerCase().includes(c));
    if (found.length === 0 && prompt.type === 'opinion_essay') checks.push('⚠ Aucun connecteur logique détecté.');
    else if (found.length > 0) checks.push(`✓ Connecteurs : ${found.slice(0,4).join(', ')}.`);
    w.feedback = checks.join('\n');
    updateProgress(p => { p.writing = p.writing || { submitted: 0 }; p.writing.submitted++; return p; });
    render();
  };

  const rightCol = h('div', {},
    h('h3', {}, 'Ta réponse'),
    h('textarea', {
      placeholder: 'Write your answer here in English...',
      value: w.text,
      oninput: (e) => { w.text = e.target.value; const wcEl = $('#wc'); if (wcEl) wcEl.textContent = `${e.target.value.trim().split(/\s+/).filter(Boolean).length} mots`; }
    }),
    h('div', { style: 'display:flex;justify-content:space-between;align-items:center;margin-top:8px;flex-wrap:wrap;gap:8px' },
      h('span', { id: 'wc', class: 'quiet-text' }, `${wordCount} mots`),
      h('div', { class: 'ribbon' },
        AI_ENABLED === true
          ? h('button', { class: 'btn btn-accent', disabled: wordCount < 12 || w.loading, onclick: aiReview },
              w.loading ? h('span', {}, h('span', { class: 'spin' }), 'Correction…') : '✦ Corriger avec l\'IA')
          : null,
        h('button', { class: 'btn btn-outline', disabled: wordCount < 12 || w.loading, onclick: localSelfReview }, 'Auto-évaluer (local)')
      )
    )
  );

  if (w.aiFeedback) {
    rightCol.appendChild(h('div', { class: 'feedback', style: 'margin-top:18px' },
      h('h5', {}, '✦ Correction IA'),
      h('div', { style: 'white-space:pre-wrap;line-height:1.7' }, w.aiFeedback)));
  }
  if (w.feedback) {
    rightCol.appendChild(h('div', { class: 'feedback', style: 'margin-top:18px' },
      h('h5', {}, 'Évaluation automatique (locale)'),
      h('div', { style: 'white-space:pre-wrap;line-height:1.7' }, w.feedback),
      h('div', { class: 'quiet-text', style: 'margin-top:10px;font-size:12px' },
        'Analyse heuristique (longueur, diversité, connecteurs). Pour une évaluation qualitative, utilise la correction IA.')));
  }

  return h('div', {},
    h('div', { class: 'section-kicker' }, '— Module V'),
    h('h2', { class: 'section-title' }, h('em', {}, 'Writing'), ' · correction IA'),
    h('p', { class: 'quiet-text', style: 'margin-bottom:14px;max-width:640px' },
      AI_ENABLED === true
        ? 'Rédige ta réponse en anglais, puis lance la correction IA : note, points forts, axes d\'amélioration et reformulations.'
        : 'Rédige ta réponse en anglais. La correction IA nécessite le déploiement (voir ⚙) ; en local, utilise l\'auto-évaluation.'),
    h('div', { class: 'ribbon', style: 'margin-bottom:20px' },
      WRITING_PROMPTS.map((p, i) => h('button', { class: `chip ${w.idx === i ? 'accent' : ''}`, onclick: () => reset(i) }, p.title))
    ),
    h('div', { class: 'card-row cols-2', style: 'align-items:start' },
      h('div', {},
        h('h3', {}, prompt.title),
        h('p', { class: 'quiet-text' }, prompt.context),
        h('div', { class: 'reading-text' }, prompt.prompt),
        h('div', { class: 'feedback', style: 'border-color:var(--gold)' },
          h('h5', { style: 'color:var(--gold)' }, 'Consigne'),
          h('div', {}, prompt.instruction))
      ),
      rightCol
    )
  );
}

const SPEAKING_PROMPTS = [
  { type: 'read_aloud', title: 'Lecture à voix haute', context: 'Lis ce texte à voix haute, clairement.', prompt: "In today's competitive market, companies must constantly innovate to retain their customers. Investing in employee training and customer service often yields the highest long-term returns." },
  { type: 'opinion', title: 'Donner son opinion', context: 'Réponds oralement à la question (30-45 secondes).', prompt: "Some people prefer to work for a large company, while others prefer a small one. Which do you prefer, and why?" },
  { type: 'describe', title: 'Décrire une situation', context: 'Décris oralement ce que tu ferais dans cette situation.', prompt: "A colleague asks you to help with an urgent project, but you are already very busy with your own deadlines. Explain how you would respond and what you would say to them." },
  { type: 'question', title: 'Répondre à des questions', context: 'Imagine un entretien. Réponds à voix haute.', prompt: "Tell me about your professional experience and what motivates you in your work. What are your main strengths?" },
];

function renderSpeaking() {
  const s = state.speaking;
  const prompt = SPEAKING_PROMPTS[s.promptIdx];

  // Détection du support de reconnaissance vocale
  if (s.supported === null) {
    s.supported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  }

  const reset = (newIdx) => {
    if (typeof newIdx === 'number') s.promptIdx = newIdx;
    s.transcript = ''; s.feedback = null; s.played = false;
    if (s.recording && window._recognition) { try { window._recognition.stop(); } catch {} }
    s.recording = false;
    render();
  };

  const startRec = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    const rec = new SR();
    window._recognition = rec;
    rec.lang = 'en-US';
    rec.continuous = true;
    rec.interimResults = true;
    let finalText = '';
    rec.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalText += t + ' ';
        else interim += t;
      }
      s.transcript = (finalText + interim).trim();
      const el = $('#transcriptBox');
      if (el) el.textContent = s.transcript || 'À l\'écoute…';
    };
    rec.onerror = (e) => { s.recording = false; render(); };
    rec.onend = () => { s.recording = false; s.transcript = finalText.trim() || s.transcript; render(); };
    rec.start();
    s.recording = true; render();
  };

  const stopRec = () => {
    if (window._recognition) { try { window._recognition.stop(); } catch {} }
    s.recording = false; render();
  };

  const evaluate = async () => {
    s.loading = true; s.feedback = null; render();
    const system = `Tu es un examinateur TOEIC Speaking. On te donne la TRANSCRIPTION de la réponse orale d'un étudiant français (transcrite automatiquement, donc la ponctuation et certains mots peuvent être imparfaits — n'en tiens pas rigueur pour la prononciation que tu ne peux pas entendre). Évalue EN FRANÇAIS : pertinence par rapport à la consigne, richesse et exactitude grammaticale, vocabulaire, fluidité apparente et structure. Structure ta réponse :

**Note estimée : X/5**

**Ce qui fonctionne**
- (2-3 puces)

**À améliorer**
- (3-4 puces concrètes)

**Formulations plus naturelles**
- Propose 2-3 tournures anglaises plus idiomatiques que l'étudiant pourrait réutiliser.

Précise que la prononciation n'est pas évaluée (transcription uniquement).`;
    const userMsg = `Type : ${prompt.type}\nConsigne : ${prompt.prompt}\n\n---\nTranscription de la réponse orale de l'étudiant :\n"${s.transcript}"\n---\n\nÉvalue maintenant.`;
    try {
      s.feedback = await callAI([{ role: 'user', content: userMsg }], system, 1400);
      updateProgress(p => { p.speaking = p.speaking || { attempted: 0 }; p.speaking.attempted++; return p; });
    } catch (e) {
      s.feedback = "⚠ L'évaluation IA a échoué : " + e.message;
    }
    s.loading = false; render();
  };

  const view = h('div', {},
    h('div', { class: 'section-kicker' }, '— Module VI'),
    h('h2', { class: 'section-title' }, h('em', {}, 'Speaking'), ' · expression orale'),
    h('p', { class: 'quiet-text', style: 'margin-bottom:14px;max-width:660px' },
      'Écoute la consigne, enregistre ta réponse à l\'oral (reconnaissance vocale du navigateur), puis fais évaluer ta transcription par l\'IA.'),
    h('div', { class: 'ribbon', style: 'margin-bottom:20px' },
      SPEAKING_PROMPTS.map((p, i) => h('button', { class: `chip ${s.promptIdx === i ? 'accent' : ''}`, onclick: () => reset(i) }, p.title))
    )
  );

  if (!s.supported) {
    view.appendChild(h('div', { class: 'card' },
      h('h3', {}, '⚠ Reconnaissance vocale non disponible'),
      h('p', {}, 'Ton navigateur ne supporte pas la reconnaissance vocale (Web Speech API). Sur iPhone, utilise Safari ; sur ordinateur, Chrome ou Edge fonctionnent le mieux.'),
      h('p', { class: 'quiet-text' }, 'Tu peux quand même t\'entraîner : lis la consigne à voix haute, puis tape ta réponse dans le champ ci-dessous pour la faire évaluer.')
    ));
  }

  const card = h('div', { class: 'card' },
    h('span', { class: 'chip accent' }, prompt.type),
    h('h3', { style: 'margin-top:10px' }, prompt.title),
    h('p', { class: 'quiet-text' }, prompt.context),
    h('div', { class: 'reading-text' }, prompt.prompt),
    h('div', { class: 'stage-controls' },
      h('button', { class: 'btn btn-outline', onclick: () => { speak(prompt.prompt); s.played = true; } }, '♪ Écouter la consigne'),
      s.supported
        ? (!s.recording
            ? h('button', { class: 'btn btn-accent', onclick: startRec }, '● Enregistrer ma réponse')
            : h('button', { class: 'btn', style: 'background:var(--red)', onclick: stopRec }, '■ Arrêter'))
        : null
    )
  );

  // Zone transcription (éditable pour permettre correction manuelle ou saisie directe)
  card.appendChild(h('div', { style: 'margin-top:18px' },
    h('div', { class: 'section-kicker', style: 'margin-bottom:8px' }, s.recording ? '● Enregistrement en cours…' : 'Transcription'),
    s.recording
      ? h('div', { id: 'transcriptBox', class: 'reading-text', style: 'min-height:80px;font-style:italic' }, s.transcript || 'À l\'écoute…')
      : h('textarea', {
          placeholder: 'Ta réponse transcrite apparaîtra ici. Tu peux aussi taper directement.',
          value: s.transcript,
          style: 'min-height:120px',
          oninput: (e) => { s.transcript = e.target.value; }
        })
  ));

  if (!s.recording && s.transcript.trim().split(/\s+/).filter(Boolean).length >= 5) {
    card.appendChild(h('div', { class: 'stage-controls' },
      AI_ENABLED === true
        ? h('button', { class: 'btn btn-accent', disabled: s.loading, onclick: evaluate },
            s.loading ? h('span', {}, h('span', { class: 'spin' }), 'Évaluation…') : '✦ Évaluer ma réponse')
        : h('span', { class: 'quiet-text' }, 'L\'évaluation IA nécessite le déploiement (voir ⚙).')
    ));
  }

  if (s.feedback) {
    card.appendChild(h('div', { class: 'feedback', style: 'margin-top:18px' },
      h('h5', {}, '✦ Évaluation orale'),
      h('div', { style: 'white-space:pre-wrap;line-height:1.7' }, s.feedback)));
  }

  view.appendChild(card);
  return view;
}

function renderTutor() {
  const t = state.tutor;

  const send = async () => {
    const msg = t.input.trim();
    if (!msg || t.loading) return;
    t.messages.push({ role: 'user', content: msg });
    t.input = '';
    t.loading = true;
    render();
    scrollChatBottom();
    const system = `Tu es un tuteur d'anglais spécialisé dans la préparation au TOEIC, pour un apprenant francophone. Tu réponds de façon claire, pédagogique et concise. Tu peux : expliquer des points de grammaire, donner des exemples, corriger des phrases, expliquer du vocabulaire et des collocations, donner des astuces pour l'examen. Tu réponds en français pour les explications mais tu donnes systématiquement des exemples en anglais. Quand tu corriges une phrase, montre la version corrigée puis explique brièvement pourquoi. Reste focalisé sur l'apprentissage de l'anglais et le TOEIC.`;
    try {
      // On envoie l'historique complet (limité aux 12 derniers messages pour le coût)
      const history = t.messages.slice(-12);
      const reply = await callAI(history, system, 1200);
      t.messages.push({ role: 'assistant', content: reply });
    } catch (e) {
      t.messages.push({ role: 'assistant', content: "⚠ Erreur : " + e.message });
    }
    t.loading = false;
    render();
    scrollChatBottom();
  };

  function scrollChatBottom() {
    setTimeout(() => { const c = $('#chatScroll'); if (c) c.scrollTop = c.scrollHeight; }, 50);
  }

  const suggestions = [
    "Quelle est la différence entre 'since' et 'for' ?",
    "Corrige : 'I have visited London last year.'",
    "Explique-moi les phrasal verbs avec 'get'.",
    "Donne-moi 5 collocations avec 'make' et 'do'.",
  ];

  if (AI_ENABLED !== true) {
    return h('div', {},
      h('div', { class: 'section-kicker' }, '— Module VII'),
      h('h2', { class: 'section-title' }, h('em', {}, 'Tuteur IA')),
      h('div', { class: 'card' },
        h('h3', {}, 'IA non disponible'),
        h('p', {}, 'Le tuteur IA nécessite le déploiement sur Netlify avec ta clé API Anthropic. Consulte l\'onglet ⚙ pour la procédure.'))
    );
  }

  const chatBox = h('div', { id: 'chatScroll', style: 'background:var(--bg-elev);border:1px solid var(--line);border-radius:4px;padding:18px;height:min(52vh,460px);overflow-y:auto;display:flex;flex-direction:column;gap:12px' });

  if (t.messages.length === 0) {
    chatBox.appendChild(h('div', { class: 'quiet-text', style: 'margin:auto;text-align:center;max-width:380px' },
      h('div', { style: 'font-family:Fraunces;font-size:20px;font-style:italic;color:var(--accent);margin-bottom:8px' }, 'Bonjour !'),
      'Pose-moi n\'importe quelle question sur l\'anglais ou le TOEIC. Grammaire, vocabulaire, correction de phrases, astuces d\'examen…'));
  }

  t.messages.forEach(m => {
    const isUser = m.role === 'user';
    chatBox.appendChild(h('div', {
      style: `max-width:85%;align-self:${isUser ? 'flex-end' : 'flex-start'};background:${isUser ? 'var(--accent)' : 'var(--bg-card)'};color:${isUser ? '#fff' : 'var(--ink)'};padding:12px 16px;border-radius:${isUser ? '12px 12px 2px 12px' : '12px 12px 12px 2px'};border:1px solid ${isUser ? 'var(--accent)' : 'var(--line-soft)'}`
    }, h('div', { style: 'white-space:pre-wrap;line-height:1.6;font-size:14px' }, m.content)));
  });

  if (t.loading) {
    chatBox.appendChild(h('div', { style: 'align-self:flex-start;color:var(--ink-mute)' },
      h('span', { class: 'spin' }), 'Le tuteur réfléchit…'));
  }

  const view = h('div', {},
    h('div', { class: 'section-kicker' }, '— Module VII'),
    h('h2', { class: 'section-title' }, h('em', {}, 'Tuteur IA'), ' · pose tes questions'),
    chatBox
  );

  // Suggestions (seulement si conversation vide)
  if (t.messages.length === 0) {
    view.appendChild(h('div', { class: 'ribbon', style: 'margin-top:14px' },
      suggestions.map(sug => h('button', { class: 'chip', onclick: () => { t.input = sug; send(); } }, sug))));
  }

  // Barre de saisie
  view.appendChild(h('div', { style: 'display:flex;gap:8px;margin-top:14px;align-items:flex-end' },
    h('textarea', {
      id: 'tutorInput',
      placeholder: 'Écris ta question…',
      value: t.input,
      style: 'min-height:52px;flex:1',
      oninput: (e) => { t.input = e.target.value; },
      onkeydown: (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
    }),
    h('button', { class: 'btn btn-accent', disabled: t.loading, onclick: send, style: 'height:52px' }, 'Envoyer')
  ));
  view.appendChild(h('p', { class: 'quiet-text', style: 'margin-top:8px;font-size:12px' },
    t.messages.length > 0
      ? h('button', { class: 'btn-ghost', style: 'background:none;border:0;color:var(--ink-mute);cursor:pointer;padding:0;text-decoration:underline', onclick: () => { t.messages = []; render(); } }, 'Effacer la conversation')
      : 'Astuce : Entrée pour envoyer, Maj+Entrée pour un retour à la ligne.'));

  return view;
}

// --- MOCK TEST ---
function renderMock() {
  const m = state.mock;
  if (!m.test) {
    m.test = {
      grammar: shuffle([...GRAMMAR_BANK]).slice(0, 15),
      reading: READING_PASSAGES[Math.floor(Math.random() * READING_PASSAGES.length)],
      listening: LISTENING_BANK[Math.floor(Math.random() * LISTENING_BANK.length)],
    };
  }
  const T = m.test;
  const totalQ = T.grammar.length + T.reading.questions.length + T.listening.questions.length;

  if (!m.started) {
    return h('div', {},
      h('div', { class: 'section-kicker' }, '— Module VI'),
      h('h2', { class: 'section-title' }, h('em', {}, 'Examen blanc')),
      h('div', { class: 'card' },
        h('h3', {}, 'Conditions de l\'examen'),
        h('ul', { style: 'line-height:1.9;font-size:15px' },
          h('li', {}, h('strong', {}, '15 questions de grammaire'), ' (Part 5)'),
          h('li', {}, h('strong', {}, '1 texte de compréhension écrite'), ' avec 4 questions'),
          h('li', {}, h('strong', {}, '1 audio'), ' avec 4 questions (écoutable une seule fois)'),
          h('li', {}, h('strong', {}, '20 minutes'), ' chronométrées'),
          h('li', {}, 'Le compte à rebours ne s\'arrête pas une fois lancé.')
        ),
        h('button', { class: 'btn btn-accent', style: 'margin-top:16px', onclick: () => {
          m.started = true; m.timeLeft = 20 * 60;
          m.timerId = setInterval(() => {
            m.timeLeft--;
            if (m.timeLeft <= 0) { clearInterval(m.timerId); finishMock(); return; }
            const t = $('#mockTimer'); if (t) t.textContent = mmss(m.timeLeft);
          }, 1000);
          render();
        }}, 'Démarrer l\'examen blanc')
      )
    );
  }

  if (m.finished) {
    let ok = 0;
    T.grammar.forEach((q, i) => { if (m.answers['g'+i] === q.a) ok++; });
    T.reading.questions.forEach((q, i) => { if (m.answers['r'+i] === q.a) ok++; });
    T.listening.questions.forEach((q, i) => { if (m.answers['l'+i] === q.a) ok++; });
    const score = Math.round((ok / totalQ) * 100);
    const niveau = score >= 85 ? 'Excellent' : score >= 70 ? 'Bon' : score >= 55 ? 'Moyen' : 'À renforcer';
    const usedT = 20 * 60 - m.timeLeft;

    return h('div', {},
      h('div', { class: 'section-kicker' }, '— Examen blanc terminé'),
      h('h2', { class: 'section-title' }, 'Score : ', h('em', {}, score), '/100'),
      h('div', { class: 'card-row cols-3', style: 'margin-top:20px' },
        h('div', { class: 'stat' }, h('div', { class: 'label' }, 'Note'),
          h('div', { class: 'value' }, h('em', {}, ok), `/${totalQ}`),
          h('div', { class: 'sub' }, 'bonnes réponses')),
        h('div', { class: 'stat' }, h('div', { class: 'label' }, 'Niveau estimé'),
          h('div', { class: 'value', style: 'font-size:28px' }, h('em', {}, niveau)),
          h('div', { class: 'sub' }, 'indicatif')),
        h('div', { class: 'stat' }, h('div', { class: 'label' }, 'Temps utilisé'),
          h('div', { class: 'value' }, mmss(usedT)),
          h('div', { class: 'sub' }, 'sur 20:00'))
      ),
      h('div', { class: 'card', style: 'margin-top:20px' },
        h('h3', {}, 'Détail par section'),
        h('div', {}, `Grammar : ${T.grammar.filter((q,i) => m.answers['g'+i] === q.a).length} / ${T.grammar.length}`),
        h('div', {}, `Reading : ${T.reading.questions.filter((q,i) => m.answers['r'+i] === q.a).length} / ${T.reading.questions.length}`),
        h('div', {}, `Listening : ${T.listening.questions.filter((q,i) => m.answers['l'+i] === q.a).length} / ${T.listening.questions.length}`),
        h('button', { class: 'btn btn-accent', style: 'margin-top:16px', onclick: () => {
          state.mock = { started: false, finished: false, answers: {}, timeLeft: 20*60, tab: 'grammar', test: null, timerId: null };
          render();
        }}, 'Nouvelle session')
      )
    );
  }

  // En cours
  const view = h('div', {},
    h('div', { class: 'mock-bar' },
      h('div', {}, h('span', { class: 'chip accent' }, 'En cours'),
        h('span', { id: 'mockTimer', style: `margin-left:10px;font-family:Fraunces;font-size:22px;color:${m.timeLeft < 60 ? 'var(--red)' : 'var(--accent)'};font-style:italic` }, mmss(m.timeLeft))),
      h('div', { class: 'quiet-text' }, `${Object.keys(m.answers).length} / ${totalQ}`),
      h('button', { class: 'btn btn-outline', onclick: finishMock }, 'Terminer')
    ),
    h('div', { class: 'ribbon', style: 'margin-bottom:16px' },
      h('button', { class: `chip ${m.tab === 'grammar' ? 'accent' : ''}`, onclick: () => { m.tab = 'grammar'; render(); } }, 'I · Grammar'),
      h('button', { class: `chip ${m.tab === 'reading' ? 'accent' : ''}`, onclick: () => { m.tab = 'reading'; render(); } }, 'II · Reading'),
      h('button', { class: `chip ${m.tab === 'listening' ? 'accent' : ''}`, onclick: () => { m.tab = 'listening'; render(); } }, 'III · Listening')
    )
  );

  if (m.tab === 'grammar') {
    const card = h('div', { class: 'card' });
    T.grammar.forEach((q, i) => {
      card.appendChild(h('div', { style: 'margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--line-soft)' },
        h('div', { class: 'display', style: 'font-size:16px;margin-bottom:6px' },
          h('em', { style: 'color:var(--accent)' }, `${i+1}.`), ' ' + q.q),
        h('div', { class: 'opts' }, q.opts.map((opt, oi) =>
          h('button', {
            class: `opt ${m.answers['g'+i] === oi ? 'selected' : ''}`,
            onclick: () => { m.answers['g'+i] = oi; render(); }
          }, h('span', { class: 'marker' }, String.fromCharCode(65 + oi)), ' ' + opt)
        ))
      ));
    });
    view.appendChild(card);
  } else if (m.tab === 'reading') {
    const textCol = h('div', {}, h('h3', {}, T.reading.title), h('div', { class: 'reading-text' }, T.reading.text));
    const qCol = h('div', {});
    T.reading.questions.forEach((q, qi) => {
      qCol.appendChild(h('div', { style: 'margin-bottom:20px' },
        h('div', { style: 'font-family:Fraunces;font-size:16px;margin-bottom:6px' },
          h('em', { style: 'color:var(--accent);margin-right:6px' }, `${qi+1}.`), q.q),
        h('div', { class: 'opts' }, q.opts.map((opt, oi) =>
          h('button', {
            class: `opt ${m.answers['r'+qi] === oi ? 'selected' : ''}`,
            onclick: () => { m.answers['r'+qi] = oi; render(); }
          }, h('span', { class: 'marker' }, String.fromCharCode(65 + oi)), ' ' + opt)))
      ));
    });
    view.appendChild(h('div', { class: 'card-row cols-2', style: 'align-items:start' }, textCol, qCol));
  } else if (m.tab === 'listening') {
    const playMock = async () => {
      m.listeningPlayed = true; render();
      for (const s of T.listening.speakers) {
        await speak(s.text, s.voice);
        await new Promise(r => setTimeout(r, 300));
      }
    };
    const card = h('div', { class: 'card' }, h('h3', {}, T.listening.title));
    if (!m.listeningPlayed) {
      card.appendChild(h('p', { class: 'quiet-text' }, 'L\'audio ne peut être écouté qu\'une seule fois.'));
      card.appendChild(h('button', { class: 'btn btn-accent', onclick: playMock }, '♪ Lancer l\'audio'));
    } else {
      card.appendChild(h('p', { class: 'quiet-text' }, 'Audio diffusé. Réponds maintenant.'));
      T.listening.questions.forEach((q, qi) => {
        card.appendChild(h('div', { style: 'margin-bottom:20px' },
          h('div', { style: 'font-family:Fraunces;font-size:16px;margin-bottom:6px' },
            h('em', { style: 'color:var(--accent);margin-right:6px' }, `${qi+1}.`), q.q),
          h('div', { class: 'opts' }, q.opts.map((opt, oi) =>
            h('button', {
              class: `opt ${m.answers['l'+qi] === oi ? 'selected' : ''}`,
              onclick: () => { m.answers['l'+qi] = oi; render(); }
            }, h('span', { class: 'marker' }, String.fromCharCode(65 + oi)), ' ' + opt)))
        ));
      });
    }
    view.appendChild(card);
  }

  return view;
}

function finishMock() {
  if (state.mock.timerId) clearInterval(state.mock.timerId);
  state.mock.finished = true;
  const m = state.mock; const T = m.test;
  let ok = 0;
  T.grammar.forEach((q, i) => { if (m.answers['g'+i] === q.a) ok++; else logMistake({ module: 'grammar', topic: 'Grammaire (examen)', q: q.q, opts: q.opts, a: q.a, expl: q.expl }); });
  T.reading.questions.forEach((q, i) => { if (m.answers['r'+i] === q.a) ok++; else logMistake({ module: 'reading', topic: 'Reading (examen)', q: q.q, opts: q.opts, a: q.a, expl: '' }); });
  T.listening.questions.forEach((q, i) => { if (m.answers['l'+i] === q.a) ok++; else logMistake({ module: 'listening', topic: 'Listening (examen)', q: q.q, opts: q.opts, a: q.a, expl: '' }); });
  const total = T.grammar.length + T.reading.questions.length + T.listening.questions.length;
  const score = Math.round((ok / total) * 100);
  updateProgress(p => {
    p.mock = p.mock || { completed: 0 };
    p.mock.completed++;
    p.mock.lastScore = score;
    return p;
  });
  render();
}

function mmss(sec) {
  return String(Math.floor(sec / 60)).padStart(2, '0') + ':' + String(sec % 60).padStart(2, '0');
}

// --- SETTINGS ---
function renderSettings() {
  const p = state.progress;
  const reset = () => {
    if (confirm('Réinitialiser toute ta progression ? Cette action est irréversible.')) {
      state.progress = {}; saveProgress({}); render();
    }
  };
  return h('div', {},
    h('div', { class: 'section-kicker' }, '— Paramètres'),
    h('h2', { class: 'section-title' }, h('em', {}, 'Réglages'), ' & données'),
    h('div', { class: 'card', style: 'margin-top:18px' },
      h('h3', {}, 'Progression'),
      h('div', { class: 'settings-row' },
        h('div', {}, h('div', {}, 'Mots de vocabulaire étudiés'),
          h('div', { class: 'quiet-text' }, `${p.vocab?.studied || 0} mots`)),
      ),
      h('div', { class: 'settings-row' },
        h('div', {}, h('div', {}, 'Questions de grammaire'),
          h('div', { class: 'quiet-text' }, `${p.grammar?.correct || 0} / ${p.grammar?.attempted || 0}`)),
      ),
      h('div', { class: 'settings-row' },
        h('div', {}, h('div', {}, 'Questions de reading'),
          h('div', { class: 'quiet-text' }, `${p.reading?.correct || 0} / ${p.reading?.attempted || 0}`)),
      ),
      h('div', { class: 'settings-row' },
        h('div', {}, h('div', {}, 'Questions de listening'),
          h('div', { class: 'quiet-text' }, `${p.listening?.correct || 0} / ${p.listening?.attempted || 0}`)),
      ),
      h('div', { class: 'settings-row' },
        h('div', {}, h('div', {}, 'Rédactions'),
          h('div', { class: 'quiet-text' }, `${p.writing?.submitted || 0} soumises`)),
      ),
      h('div', { class: 'settings-row' },
        h('div', {}, h('div', {}, 'Exercices de speaking'),
          h('div', { class: 'quiet-text' }, `${p.speaking?.attempted || 0} réalisés`)),
      ),
      h('div', { class: 'settings-row' },
        h('div', {}, h('div', {}, 'Examens blancs'),
          h('div', { class: 'quiet-text' }, p.mock?.completed ? `${p.mock.completed} (dernier : ${p.mock.lastScore}/100)` : 'aucun')),
      )
    ),
    renderAIStatusCard(),
    h('div', { class: 'card', style: 'margin-top:18px' },
      h('h3', {}, 'À propos'),
      h('p', {}, 'Atelier TOEIC est une PWA hors-ligne. Ta progression est stockée localement sur ton appareil ', h('span', { class: 'mono' }, '(localStorage)'), ' et ne quitte jamais ton téléphone. Les fonctions IA, elles, transitent par ton backend Netlify vers l\'API Anthropic.'),
      h('p', { class: 'quiet-text' }, 'Pour installer : ouvre cette page dans Safari → bouton Partager (⬆) → "Sur l\'écran d\'accueil".'),
      h('div', { class: 'settings-row', style: 'margin-top:14px;padding-top:14px;border-top:1px solid var(--line-soft);border-bottom:0' },
        h('button', { class: 'btn btn-outline danger', onclick: reset, style: 'border-color:var(--red);color:var(--red)' }, 'Réinitialiser ma progression')
      )
    )
  );
}

// Carte de statut IA + instructions de déploiement
function renderAIStatusCard() {
  let badge, msg, color;
  if (AI_ENABLED === true) {
    badge = '✓ IA active'; color = 'var(--green)';
    msg = 'Les fonctions IA sont opérationnelles : correction Writing, évaluation Speaking, conseils, génération d\'exercices et tuteur.';
  } else if (AI_ENABLED === 'no-key') {
    badge = '⚠ Clé manquante'; color = 'var(--gold)';
    msg = 'Le backend est déployé mais la variable ANTHROPIC_API_KEY n\'est pas configurée. Ajoute-la dans Netlify → Site configuration → Environment variables, puis redéploie.';
  } else {
    badge = '○ IA hors-ligne'; color = 'var(--ink-mute)';
    msg = 'Tu utilises l\'app en local ou sans backend. Les fonctions IA sont désactivées ; le reste fonctionne normalement. Déploie sur Netlify pour activer l\'IA.';
  }

  return h('div', { class: 'card', style: `margin-top:18px;border-left:3px solid ${color}` },
    h('div', { style: 'display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px' },
      h('h3', { style: 'margin:0' }, 'Statut de l\'IA'),
      h('span', { class: 'chip', style: `border-color:${color};color:${color}` }, badge)
    ),
    h('p', { style: 'margin-top:12px' }, msg),
    h('details', { style: 'margin-top:8px' },
      h('summary', { style: 'cursor:pointer;color:var(--accent);font-weight:600' }, 'Voir la procédure de déploiement Netlify'),
      h('ol', { style: 'line-height:1.8;font-size:14px;margin-top:10px' },
        h('li', {}, 'Crée un compte gratuit sur ', h('span', { class: 'mono' }, 'netlify.com'), ' (connexion via GitHub conseillée).'),
        h('li', {}, 'Récupère une clé API sur ', h('span', { class: 'mono' }, 'console.anthropic.com'), ' → API Keys.'),
        h('li', {}, 'Pousse le projet sur GitHub, puis importe-le sur Netlify (Add new site → Import an existing project).'),
        h('li', {}, 'Dans Netlify → Site configuration → Environment variables, ajoute ', h('span', { class: 'mono' }, 'ANTHROPIC_API_KEY'), ' = ta clé.'),
        h('li', {}, 'Redéploie. C\'est tout — l\'app détecte automatiquement l\'IA.')
      )
    )
  );
}

// =====================================================================

render();                          // 1er rendu immédiat
loadVoices().then(() => render()); // re-render quand les voix sont prêtes
detectAI().then(() => render());   // re-render quand on sait si l'IA est dispo
</script>
